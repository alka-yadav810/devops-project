name: CI/CD Deploy to EC2 🚀

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout latest code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Login to Docker Hub
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3️⃣ Build Docker image
      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/devops-app:latest .

      # 4️⃣ Push Docker image
      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/devops-app:latest

      # 5️⃣ Deploy to EC2
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            # latest image pull
            docker pull ${{ secrets.DOCKER_USERNAME }}/devops-app:latest

            # port 8000 use karne wale old containers stop/remove
            docker ps -q --filter "publish=8000" | xargs -r docker stop
            docker ps -aq --filter "publish=8000" | xargs -r docker rm

            # same name old container remove
            docker stop devops-app || true
            docker rm devops-app || true

            # new container run
            docker run -d -p 8000:8000 --name devops-app ${{ secrets.DOCKER_USERNAME }}/devops-app:latest